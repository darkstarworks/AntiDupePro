name: AntiDupePro
version: '${version}'
main: io.github.darkstarworks.AntiDupePro
api-version: '1.21'
prefix: DUPE »
load: STARTUP
authors: [ darkstarworks ]
description: Anti-Dupe Pro - Chain of Custody item-flow auditor
website: https://github.com/darkstarworks

# Folia compatibility (PaperMC's regionised threading fork).
folia-supported: true

commands:
  adp:
    description: AntiDupePro base command
    usage: /<command> <ledger|help>
    aliases: [antidupe, antidupepro]

permissions:
  antidupe.admin:
    description: Full admin access (ledger commands and dupe alerts)
    default: op
    children:
      antidupe.ledger: true
  antidupe.ledger:
    description: Access to Chain of Custody ledger commands
    default: op
