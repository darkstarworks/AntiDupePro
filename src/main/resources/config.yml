# AntiDupePro Configuration

# =============================================================================
# DETECTION
# =============================================================================
detection:
  # Global detection sensitivity, 1 (very lenient) to 100 (very paranoid).
  # 50 is balanced and right for most casual servers. Higher values lower the
  # excess needed to alert and tighten source-bound match windows.
  sensitivity: 50

# Console log verbosity. One of: CRITICAL, ERROR, WARNING, INFO, DEBUG.
# Each level includes the ones above it (WARNING also shows ERROR + CRITICAL).
# Note: CRITICAL and ERROR both map to the server's SEVERE level.
console_log_level: INFO

# =============================================================================
# STORAGE BACKEND
# =============================================================================
# SQLITE (default) — file-based, persistent, zero ops. Recommended.
# REDIS          — fast, shareable across multiple servers, requires a running Redis.
# MEMORY         — in-process only; data lost on restart. Dev/testing only.
storage:
  backend: SQLITE
  # SQLite file path, relative to the plugin data folder.
  sqlite_file: "storage.db"
  # SQLite file for the v2 ledger (separate file so you can wipe one without the other).
  sqlite_ledger_file: "ledger.db"

# =============================================================================
# REDIS CONFIGURATION (used only when storage.backend: REDIS)
# =============================================================================
redis:
  # Redis server host
  host: "localhost"

  # Redis server port
  port: 6379

  # Redis database number (0-15)
  database: 0

  # Redis password (leave empty if no password)
  password: ""

  # Connection timeout in seconds
  timeout: 10

# =============================================================================
# TRACKED MATERIALS, TMAR LIMITS, ALERT THRESHOLDS
# =============================================================================
# All material-keyed lists now live in materials.yml (next to this file).
# That keeps config.yml short even when many items are tracked. Edit the
# tracked items list, rate limits and alert thresholds there.

# Auto-delete detected dupes
# If true, automatically removes duped items from the game
# If false, only logs and alerts admins
auto_delete_dupes: false

# Shadow mode
# Track suspects and log their stash locations before taking action
shadow_mode: true

# If true, cancel double-click "collect to cursor" on tracked materials.
# Off by default; only useful for the strictest paranoia mode.
block_collect_to_cursor: false

# =============================================================================
# CHAIN OF CUSTODY (Ledger + Proof of Witness)
# =============================================================================
# As of 3.0.0 the ledger is the sole detection system. The legacy per-item
# isotope tags have been removed (they broke vanilla stacking). All settings
# below tune the ledger; it is always on.

ledger:
  # Redis database number for ledger data (used only with storage.backend: REDIS).
  redis_database: 1

  # Proof of Witness settings
  witness:
    # Radius in blocks for witness detection (default: 48 = ~3 chunks)
    radius: 48

    # Minimum witnesses for VERIFIED trust level
    verified_threshold: 3

    # Flag suspicious patterns (high solo-action ratio)
    flag_suspicious_patterns: true

    # Solo ratio threshold for suspicion (0.0-1.0)
    # If >80% of a player's actions are unwitnessed on a populated server, flag them
    suspicious_solo_ratio: 0.8

  # Reconciliation settings
  reconciliation:
    # Cooldown between reconciliations per player (milliseconds)
    cooldown_ms: 5000

    # Run reconciliation on item pickup
    on_pickup: true

    # Run reconciliation on inventory close
    on_inventory_close: false

  # Alert thresholds (excess items per material) are configured in materials.yml.
